name: Deploy

on:
  schedule:
    # 4x/day, spaced 6h apart.
    # NOTE: GitHub cron uses UTC. Vietnam is UTC+7 (no daylight saving time).
    - cron: '0 19 * * *' # 02:00 Vietnam (previous day 19:00 UTC)
    - cron: '0 1 * * *'  # 08:00 Vietnam
    - cron: '0 7 * * *'  # 14:00 Vietnam
    - cron: '0 13 * * *' # 20:00 Vietnam
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Persist Next.js's webpack compiler cache between builds so `next build`
      # (inside deploy:full) doesn't recompile every client bundle from scratch
      # — this is the fix for Next's "No Cache Detected in Build" warning.
      # Deliberately scoped to /webpack ONLY: caching all of .next/cache would
      # also persist Next's fetch/data cache (fetchClient fetches with
      # next.revalidate=28800 = 8h). These refresh builds run every 6h, so a
      # persisted fetch cache would replay <8h-old TMDB responses and partially
      # defeat the 4x/day refresh. Key rotates on lockfile/source changes;
      # restore-keys gives a warm partial cache for incremental compiles.
      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache/webpack
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.{js,jsx,ts,tsx}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-


      # IMDb's Non-Commercial dataset refreshes once a day, but this workflow
      # deploys up to 4x/day. Cache the generated rating shards keyed by UTC
      # date so only the FIRST deploy each day downloads + shards the ~10MB
      # dataset (~3s); the other three restore it instantly. Cache miss (incl.
      # the first run of a new day) regenerates. Fails soft — a download hiccup
      # just leaves the app on TMDB ratings for that build.
      - name: Compute UTC date
        id: today
        run: echo "day=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      - name: Cache IMDb rating shards (daily)
        id: imdb-cache
        uses: actions/cache@v4
        with:
          path: public/imdb-ratings
          key: imdb-ratings-${{ steps.today.outputs.day }}

      - name: Build IMDb rating shards
        if: steps.imdb-cache.outputs.cache-hit != 'true'
        run: pnpm imdb:ratings

      - name: Upload Worker secrets
        run: |
          echo "${{ secrets.TMDB_API_KEY }}" | pnpm wrangler secret put TMDB_API_KEY
          echo "${{ secrets.TMDB_HEADER_KEY }}" | pnpm wrangler secret put TMDB_HEADER_KEY
          echo "${{ secrets.GOOGLE_GTM_ID }}" | pnpm wrangler secret put GOOGLE_GTM_ID
          echo "${{ secrets.GOOGLE_MEASUREMENT_ID }}" | pnpm wrangler secret put GOOGLE_MEASUREMENT_ID
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - run: pnpm run deploy:full
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TMDB_HEADER_KEY: ${{ secrets.TMDB_HEADER_KEY }}
          NEXT_PUBLIC_TMDB_BASEURL: ${{ secrets.NEXT_PUBLIC_TMDB_BASEURL }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          NEXT_PUBLIC_STREAMING_MOVIES_API_URL: ${{ secrets.NEXT_PUBLIC_STREAMING_MOVIES_API_URL }}
          NEXT_PUBLIC_SEARCH_ACTOR_GOOGLE: ${{ secrets.NEXT_PUBLIC_SEARCH_ACTOR_GOOGLE }}
          NEXT_PUBLIC_IMAGE_CACHE_HOST_URL: ${{ secrets.NEXT_PUBLIC_IMAGE_CACHE_HOST_URL }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}

      # Re-apply the edge-cache + WAF rules on every deploy so they can't silently
      # drift off (they were never wired in before, so prod ran with NO edge cache
      # — every request hit the Worker and burned the free-plan 10ms CPU budget).
      # Idempotent: rules are keyed by the "[imovie-waf]" description prefix and
      # replaced in place. Runs AFTER deploy so a WAF failure never blocks the
      # Worker rollout. REQUIRES the token to carry Zone.Cache Rules +
      # Zone.Transform Rules + Zone WAF: Edit — if it lacks them this step fails
      # loudly (that's the point: a red step here means the cache rule isn't live).
      - name: Apply Cloudflare cache + WAF rules
        run: pnpm run waf:apply
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_NAME: imovie.dpdns.org
